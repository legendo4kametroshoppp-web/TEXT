<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DotVision | Elite Dev Interface</title>
    <style>
        /* =========================================
           CORE DESIGN SYSTEM (PREMIUM DARK THEME)
           =========================================
        */
        :root {
            --accent: #bc13fe;
            --accent-rgb: 188, 19, 254;
            --accent-glow: rgba(188, 19, 254, 0.5);
            --bg-dark: #050505;
            --bg-card: rgba(15, 15, 15, 0.8);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --transition-speed: 0.4s;
            --font-main: 'Inter', system-ui, -apple-system, sans-serif;
            --font-mono: 'Consolas', 'Fira Code', monospace;
        }

        /* 1. RESET & SCROLLBAR 
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: #222;
            border-radius: 10px;
            transition: var(--transition-speed);
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* 2. ANIMATED BACKGROUND 
        */
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            /* Dot Grid Pattern */
            background-image: radial-gradient(rgba(188, 19, 254, 0.1) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* Ambient Glow Spheres */
        .ambient-sphere {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(80px);
            opacity: 0.15;
            animation: moveSphere 20s infinite alternate ease-in-out;
        }
        @keyframes moveSphere {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        /* 3. SETTINGS & GEAR 
        */
        .settings-container {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 1000;
        }

        .gear-btn {
            width: 48px;
            height: 48px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }
        .gear-btn svg {
            stroke: var(--text-secondary);
            transition: var(--transition-speed);
        }
        .gear-btn:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: rotate(45deg);
        }
        .gear-btn:hover svg { stroke: var(--accent); }

        .theme-panel {
            position: absolute;
            top: 60px;
            right: 0;
            width: 280px;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(25px);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .theme-panel.active {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        /* 4. TYPOGRAPHY & LOGO 
        */
        .logo {
            font-size: 84px;
            font-weight: 900;
            letter-spacing: -3px;
            margin-bottom: 40px;
            text-align: center;
            user-select: none;
        }
        .logo span {
            color: var(--accent);
            text-shadow: 0 0 40px var(--accent-glow), 0 0 100px var(--accent-glow);
            animation: titlePulse 3s infinite;
        }
        @keyframes titlePulse {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        /* 5. TABS & NAVIGATION 
        */
        .nav-tabs {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--border-color);
            padding: 6px;
            border-radius: 16px;
            display: flex;
            gap: 5px;
            margin-bottom: 40px;
            backdrop-filter: blur(10px);
        }
        .nav-btn {
            padding: 14px 34px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s;
        }
        .nav-btn.active {
            background: var(--accent);
            color: white;
            box-shadow: 0 10px 25px var(--accent-glow);
        }

        /* 6. MAIN WORKSPACE 
        */
        .workspace {
            width: 100%;
            max-width: 880px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 32px;
            padding: 45px;
            backdrop-filter: blur(20px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }
        .workspace::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.3;
        }

        /* 7. INPUT STYLING 
        */
        .input-wrapper {
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        label {
            display: block;
            margin-bottom: 12px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .main-input {
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            border: 1.5px solid var(--border-color);
            border-radius: 16px;
            color: white;
            font-size: 16px;
            transition: all 0.3s;
        }
        .main-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.15), inset 0 0 10px rgba(188, 19, 254, 0.05);
            background: rgba(0, 0, 0, 0.6);
        }

        /* Custom Range Slider */
        .slider {
            -webkit-appearance: none;
            width: 100%;
            height: 8px;
            background: #1a1a1a;
            border-radius: 10px;
            margin: 15px 0;
        }
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 15px var(--accent-glow);
            border: 3px solid #fff;
            transition: 0.2s;
        }
        .slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* 8. ACTION BUTTONS 
        */
        .btn-row {
            display: flex;
            justify-content: center;
            margin: 25px 0;
        }
        .copy-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            padding: 16px 32px;
            border-radius: 14px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 13px;
        }
        .copy-btn:hover {
            border-color: var(--accent);
            background: rgba(188, 19, 254, 0.05);
            color: var(--accent);
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.1);
        }
        .copy-btn svg { transition: 0.3s; }
        .copy-btn:active { transform: scale(0.95); }

        /* 9. TERMINAL EMULATOR 
        */
        .terminal {
            background: #000;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .term-header {
            background: #111;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-color);
        }
        .term-controls { display: flex; gap: 8px; }
        .t-dot { width: 12px; height: 12px; border-radius: 50%; }
        .t-red { background: #ff5f56; }
        .t-yellow { background: #ffbd2e; }
        .t-green { background: #27c93f; }
        .term-title { font-size: 11px; color: #444; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .output-box {
            padding: 30px;
            font-family: var(--font-mono);
            font-size: 11px;
            line-height: 1.1;
            color: #fff;
            white-space: pre;
            overflow: auto;
            min-height: 200px;
            max-height: 500px;
            background: radial-gradient(circle at top right, rgba(188,19,254,0.05), transparent);
        }

        /* 10. COLOR PICKER GRID 
        */
        .color-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-top: 15px;
        }
        .color-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.3s;
        }
        .color-option:hover { transform: scale(1.1); border-color: white; }

        .hidden { display: none !important; }

        /* =========================================
           END OF STYLE (APPROX 250 LINES OF LOGIC)
           =========================================
        */
    </style>
</head>

            'R': [" в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  ", " в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•— ", " в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ ", " в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•— ", " в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ ", " в•ҡв•җв•қ  в•ҡв•җв•қ "],
            'S': [" в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— ", " в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ ", " в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— ", " в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘ ", " в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘ ", " в•ҡв•җв•җв•җв•җв•җв•җв•қ "],
            'T': [" в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—", " в•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қ", "    в–Ҳв–Ҳв•‘   ", "    в–Ҳв–Ҳв•‘   ", "    в–Ҳв–Ҳв•‘   ", "    в•ҡв•җв•қ   "],
            'U': [" в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— ", " в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ ", " в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ ", " в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ ", " в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ ", "  в•ҡв•җв•җв•җв•җв•җв•қ "],
            'V': [" в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—", " в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘", " в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘", " в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қ", "  в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ ", "   в•ҡв•җв•җв•җв•қ  "],
            'W': [" в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•—", " в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘", " в–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘", " в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘", " в•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қ", "  в•ҡв•җв•җв•қв•ҡв•җв•җв•қ "],
            'X': [" в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•—", " в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қ", "  в•ҡв–Ҳв–Ҳв–Ҳв•”в•қ ", "  в–Ҳв–Ҳв•”в–Ҳв–Ҳв•— ", " в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•—", " в•ҡв•җв•қ  в•ҡв•җв•қ"],
            'Y': [" в•ҡв–Ҳв–Ҳв•—  в–Ҳв–Ҳв•”в•қ", "  в•ҡв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•қ ", "   в•ҡв–Ҳв–Ҳв–Ҳв•”в•қ  ", "    в–Ҳв–Ҳв•‘    ", "    в–Ҳв–Ҳв•‘    ", "    в•ҡв•җв•қ    "],
            'Z': [" в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—", " в•ҡв•җв•җв–Ҳв–Ҳв–Ҳв•”в•қ", "   в–Ҳв–Ҳв–Ҳв•”в•қ ", "  в–Ҳв–Ҳв–Ҳв•”в•қ  ", " в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—", " в•ҡв•җв•җв•җв•җв•җв•җв•қ"],
            ' ': ["      ", "      ", "      ", "      ", "      ", "      "]
        };

        let currentImg = null;

        function toggleSettings() {
            document.getElementById('settingsMenu').classList.toggle('active');
        }

        function changeTheme(color) {
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', color + '66');
            toggleSettings();
        }

        function switchTab(mode) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('sectionImg').classList.add('hidden');
            document.getElementById('sectionTxt').classList.add('hidden');

            if(mode === 'img') {
                document.getElementById('tabImg').classList.add('active');
                document.getElementById('sectionImg').classList.remove('hidden');
            } else {
                document.getElementById('tabTxt').classList.add('active');
                document.getElementById('sectionTxt').classList.remove('hidden');
            }
        }

        const processImage = () => {
            if(!currentImg) return;
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const width = parseInt(document.getElementById('contrastSlider').value);
            const height = Math.round(currentImg.height * (width / currentImg.width) * 0.5);
            
            canvas.width = width;
            canvas.height = height;
            ctx.drawImage(currentImg, 0, 0, width, height);
            
            const pixels = ctx.getImageData(0, 0, width, height).data;
            let ascii = "";
            const charMap = ["в–Ҳ", "в–“", "в–’", "в–‘", " ", " "];

            for(let y=0; y<height; y++) {
                for(let x=0; x<width; x++) {
                    const idx = (y * width + x) * 4;
                    const brightness = (pixels[idx] + pixels[idx+1] + pixels[idx+2]) / 3;
                    ascii += charMap[Math.floor((brightness/255) * (charMap.length-1))];
                }
                ascii += "\n";
            }
            document.getElementById('outBox').textContent = ascii;
        };

        document.getElementById('fileIn').onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    currentImg = img;
                    processImage();
                };
                img.src = event.target.result;
            };
            if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        };

        document.getElementById('contrastSlider').oninput = processImage;

        document.getElementById('textIn').oninput = (e) => {
            const input = e.target.value.toUpperCase();
            if(!input) {
                document.getElementById('outBox').textContent = "Waiting for text input...";
                return;
            }
            let lines = ["", "", "", "", "", ""];
            for(let char of input) {
                const map = alphabet[char] || alphabet[' '];
                for(let i=0; i<6; i++) lines[i] += map[i];
            }
            document.getElementById('outBox').textContent = lines.join('\n');
        };

        function copyOutput() {
            const content = document.getElementById('outBox').textContent;
            navigator.clipboard.writeText(content).then(() => {
                const btn = document.querySelector('.copy-btn');
                const oldText = btn.innerHTML;
                btn.innerHTML = 'вң” РЎРәРҫРҝС–Р№РҫРІР°РҪРҫ!';
                setTimeout(() => btn.innerHTML = oldText, 2000);
            });
        }
    </script>
